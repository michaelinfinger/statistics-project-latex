name: Compile and Push LaTeX PDF

on:
  push:
    branches: [ "main" ]

permissions:
  contents: write

jobs:
  build_latex:
    runs-on: ubuntu-latest
    steps:
      - name: Set up Git repository
        uses: actions/checkout@v4

      # Wrap the filename in single quotes inside the YAML string
      - name: Compile LaTeX document
        uses: xu-cheng/latex-action@v3
        with:
          root_file: 'main.tex'

      # Double-quote the file pattern to preserve spaces in the shell environment
      - name: Commit and Push PDF
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Automated PDF compilation [skip ci]"
          file_pattern: '*.pdf'
